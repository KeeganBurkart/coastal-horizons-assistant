services:
  - type: web
    name: coastal-horizons-assistant
    runtime: python
    plan: free
    buildCommand: "echo no build needed"
    startCommand: "python3 server.py"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set this in the Render dashboard
      - key: RATE_LIMIT
        value: "200"  # requests/hour/IP; raised so the full eval suite can run in one pass
