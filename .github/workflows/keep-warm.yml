name: Keep Render instance warm

# Free-tier Render spins down after ~15 minutes idle, which makes the first
# visit take 50+ seconds. Pinging /health every 10 minutes keeps the demo
# instantly loadable. Disable this workflow when the demo doesn't need to be
# hot (it does nothing harmful, just wakes the instance).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -sf --max-time 90 --retry 3 --retry-delay 10 --retry-all-errors \
            https://coastal-horizons-assistant.onrender.com/health
